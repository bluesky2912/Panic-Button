<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>PANIC BUTTON</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Share+Tech+Mono&family=Bebas+Neue&display=swap');

:root {
  --red:#ff1133;--yellow:#ffe500;--cyan:#00eeff;--green:#2dff00;
  --purple:#cc00ff;--orange:#ff5500;--dim:#44446a;--text:#ddddf5;
  --panel:#08080f;--border:#14142a;
}

*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
html,body{width:100%;height:100%;height:100dvh;background:#030306;font-family:'Share Tech Mono',monospace;color:var(--text);overflow:hidden;}

/* scanlines */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(transparent 0,transparent 2px,rgba(0,0,0,.1) 2px,rgba(0,0,0,.1) 3px);pointer-events:none;z-index:9998;}

#bgcanvas{position:fixed;inset:0;z-index:0;}
#app{width:100%;height:100%;height:100dvh;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;}

/* ── CABINET ── */
.cab{
  width:min(440px,100vw);
  height:min(780px,100dvh);
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:clamp(0px,3vw,18px);
  display:flex;flex-direction:column;align-items:center;
  position:relative;overflow:hidden;
  padding:0 0 max(12px,env(safe-area-inset-bottom));
  box-shadow:0 0 0 1px rgba(0,238,255,.04),0 0 80px rgba(0,0,0,.97),inset 0 1px 0 rgba(255,255,255,.05);
  transition:filter .04s;
}
@media(max-width:440px){.cab{border-radius:0;border-left:none;border-right:none;}}
.cab.chroma{filter:drop-shadow(-3px 0 0 rgba(255,0,60,.7)) drop-shadow(3px 0 0 rgba(0,238,255,.7));}
.cab.shake{animation:do-shake .4s ease-in-out;}
@keyframes do-shake{
  0%,100%{transform:translate(0,0) rotate(0)}
  8%{transform:translate(-10px,5px) rotate(-2deg)}
  20%{transform:translate(10px,-5px) rotate(2deg)}
  35%{transform:translate(-7px,7px) rotate(-1.2deg)}
  50%{transform:translate(7px,-4px) rotate(1.2deg)}
  65%{transform:translate(-3px,2px) rotate(-.5deg)}
  80%{transform:translate(2px,-1px) rotate(.3deg)}
}

/* corruption canvas */
.corrupt-ov{position:absolute;inset:0;pointer-events:none;z-index:90;border-radius:inherit;opacity:1;mix-blend-mode:screen;}

/* ── HEADER ── */
.hdr{width:100%;background:#03030a;border-bottom:1px solid var(--border);padding:clamp(8px,2.5vw,14px) 18px clamp(7px,2vw,12px);text-align:center;flex-shrink:0;}
.game-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(24px,6.5vw,38px);letter-spacing:clamp(6px,2vw,10px);color:var(--red);text-shadow:0 0 12px #ff1133,0 0 35px #ff113388,0 0 70px #ff113344;line-height:1;}
.tagline{font-size:clamp(7px,2vw,9px);color:var(--dim);letter-spacing:2px;margin-top:2px;text-transform:uppercase;}

/* heartbeat stripe */
.hb-stripe{width:100%;height:3px;position:relative;overflow:hidden;background:#08080f;flex-shrink:0;}
.hb-stripe::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,var(--red),transparent);opacity:0;}
.hb-stripe.pulse::after{animation:hb-wave .35s ease-out forwards;}
@keyframes hb-wave{0%{left:-60%;opacity:0}30%{opacity:1}100%{left:140%;opacity:0}}

/* ── LIVES + DIFF ── */
.top-row{display:flex;align-items:center;gap:7px;padding:clamp(6px,2vw,10px) 16px 0;width:100%;flex-shrink:0;}
.lives-lbl{font-size:clamp(7px,2vw,9px);letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
.life{font-size:clamp(14px,4vw,18px);transition:transform .2s,opacity .3s;display:inline-block;}
.life.lost{opacity:.15;transform:scale(.65);filter:grayscale(1) brightness(.5);}
.life.flash-die{animation:life-die .4s ease-out;}
@keyframes life-die{0%{transform:scale(1.5)}50%{transform:scale(.3) rotate(180deg)}100%{transform:scale(.65)}}
.spacer{flex:1;}
.diff-pill{font-size:clamp(7px,2vw,9px);letter-spacing:2px;padding:3px 8px;border-radius:2px;text-transform:uppercase;border:1px solid currentColor;}
.dp-easy  {color:#2dff00;border-color:#2dff0044;}
.dp-medium{color:var(--yellow);border-color:#ffe50044;}
.dp-hard  {color:var(--orange);border-color:#ff550044;}
.dp-chaos {color:var(--red);border-color:#ff113344;animation:dp-chaos .4s ease-in-out infinite alternate;}
@keyframes dp-chaos{from{text-shadow:0 0 5px #ff1133}to{text-shadow:0 0 14px #ff1133,0 0 28px #ff113366}}

/* ── SCORES ── */
.score-row{display:flex;gap:8px;padding:clamp(6px,2vw,9px) 16px 0;width:100%;flex-shrink:0;}
.sbox{flex:1;background:#05050d;border:1px solid var(--border);border-radius:8px;padding:clamp(6px,2vw,8px) 10px;text-align:center;position:relative;overflow:hidden;}
.sbox::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.025),transparent 55%);pointer-events:none;}
.slbl{font-size:clamp(7px,2vw,9px);letter-spacing:2px;color:var(--dim);text-transform:uppercase;display:block;margin-bottom:1px;}
.sval{font-family:'Bebas Neue',sans-serif;font-size:clamp(30px,9vw,40px);line-height:1;color:var(--yellow);text-shadow:0 0 10px #ffe500,0 0 28px #ffe50077;transition:transform .1s;}
.sval.pop{transform:scale(1.4);color:var(--green);text-shadow:0 0 12px #2dff00,0 0 30px #2dff0088;}
.rank-lbl{font-size:clamp(7px,2vw,9px);letter-spacing:1px;margin-top:1px;color:var(--cyan);text-shadow:0 0 8px #00eeff;}

/* ── STREAK ── */
.streak-row{display:flex;align-items:center;gap:7px;padding:clamp(5px,1.5vw,8px) 16px 0;width:100%;flex-shrink:0;}
.stk-lbl{font-size:clamp(7px,2vw,9px);letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
.stk-track{flex:1;height:6px;background:#05050d;border:1px solid var(--border);border-radius:3px;overflow:hidden;}
.stk-fill{height:100%;border-radius:3px;transition:width .2s ease,background .3s;background:var(--purple);box-shadow:0 0 7px var(--purple);}
.stk-fill.hot{background:var(--yellow);box-shadow:0 0 10px var(--yellow);animation:stk-hot .3s ease-in-out infinite alternate;}
@keyframes stk-hot{from{box-shadow:0 0 6px var(--yellow)}to{box-shadow:0 0 18px var(--yellow),0 0 30px #ffe50066}}
.stk-val{font-size:clamp(9px,3vw,12px);color:var(--purple);min-width:22px;text-align:right;transition:color .3s;}
.stk-val.hot{color:var(--yellow);text-shadow:0 0 6px var(--yellow);}

/* ── INSTRUCTION AREA ── */
.inst-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;position:relative;padding:8px 12px;min-height:0;}

.taunt{font-size:clamp(8px,2.5vw,10px);letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:5px;min-height:13px;transition:color .2s;}
.taunt.hot{color:var(--red);text-shadow:0 0 6px #ff1133;animation:taunt-flash .15s ease-in-out infinite alternate;}
@keyframes taunt-flash{from{opacity:1}to{opacity:.5}}

.inst{font-family:'Black Han Sans',sans-serif;font-size:clamp(28px,9vw,54px);text-align:center;line-height:1.0;letter-spacing:2px;padding:0 4px;will-change:transform;}
.cr {color:var(--red);   text-shadow:0 0 14px #ff1133,0 0 40px #ff113366;}
.cy {color:var(--cyan);  text-shadow:0 0 14px #00eeff,0 0 40px #00eeff66;}
.cg {color:var(--green); text-shadow:0 0 14px #2dff00,0 0 40px #2dff0066;}
.cy2{color:var(--yellow);text-shadow:0 0 14px #ffe500,0 0 40px #ffe50066;}
.cp {color:var(--purple);text-shadow:0 0 14px #cc00ff,0 0 40px #cc00ff66;}
.co {color:var(--orange);text-shadow:0 0 14px #ff5500,0 0 40px #ff550066;}

@keyframes inst-slam{0%{opacity:0;transform:scale(.3) rotate(-8deg)}55%{opacity:1;transform:scale(1.12) rotate(2deg)}75%{transform:scale(.97) rotate(-1deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
@keyframes inst-out {0%{opacity:1;transform:scale(1)}40%{opacity:0;transform:scale(1.3) rotate(5deg)}100%{opacity:0}}
@keyframes inst-jitter{0%,100%{transform:translate(0,0)}20%{transform:translate(-3px,2px)}40%{transform:translate(3px,-2px)}60%{transform:translate(-2px,3px)}80%{transform:translate(2px,-1px)}}
.inst.appear {animation:inst-slam .2s cubic-bezier(.22,1,.36,1) forwards;}
.inst.leaving{animation:inst-out .15s ease-in forwards;}
.inst.jitter {animation:inst-jitter .12s ease-in-out infinite;}
@keyframes cr-pulse{from{text-shadow:0 0 14px #ff1133,0 0 40px #ff113366}to{text-shadow:0 0 30px #ff1133,0 0 60px #ff1133,0 0 80px #ff113388}}

.sub-inst{font-size:clamp(9px,2.5vw,11px);letter-spacing:2px;color:var(--dim);margin-top:5px;text-transform:uppercase;min-height:13px;}

/* hold-progress ring (for hold instructions on mobile) */
.hold-ring{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);opacity:0;pointer-events:none;transition:opacity .15s;}
.hold-ring.show{opacity:1;}
.hold-ring svg{width:44px;height:44px;transform:rotate(-90deg);}
.hr-bg{fill:none;stroke:#14142a;stroke-width:4;}
.hr-fill{fill:none;stroke:var(--orange);stroke-width:4;stroke-linecap:round;stroke-dasharray:113;stroke-dashoffset:113;transition:stroke-dashoffset .05s linear;}

.glitch-txt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Bebas Neue',sans-serif;font-size:clamp(26px,8vw,50px);pointer-events:none;opacity:0;white-space:nowrap;text-shadow:2px 0 var(--red),-2px 0 var(--cyan);}
@keyframes glitch-show{0%{opacity:0;transform:translate(-50%,-50%) skewX(20deg)}10%{opacity:1;transform:translate(-52%,-50%) skewX(-5deg)}30%{opacity:1;transform:translate(-50%,-50%) skewX(0)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) skewX(3deg)}}
.glitch-txt.show{animation:glitch-show .6s ease-out forwards;}

.near-miss-el{position:absolute;top:5px;left:50%;transform:translateX(-50%);font-family:'Bebas Neue',sans-serif;font-size:clamp(11px,3vw,13px);letter-spacing:3px;color:var(--yellow);text-shadow:0 0 10px var(--yellow);opacity:0;pointer-events:none;white-space:nowrap;}
@keyframes nm{0%{opacity:0;transform:translateX(-50%) scale(.4)}25%{opacity:1;transform:translateX(-50%) scale(1.2)}75%{opacity:1;transform:translateX(-50%) scale(1)}100%{opacity:0;transform:translateX(-50%) scale(.9)}}
.near-miss-el.show{animation:nm 1s ease-out forwards;}

/* ── TIMER ── */
.timer-wrap{width:calc(100% - 32px);margin:0 16px;flex-shrink:0;}
.timer-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.timer-lbl{font-size:clamp(7px,2vw,9px);letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
.timer-num{font-size:clamp(11px,3vw,13px);color:var(--cyan);font-family:'Bebas Neue',sans-serif;letter-spacing:2px;transition:color .2s;}
.timer-num.warn  {color:var(--yellow);}
.timer-num.danger{color:var(--red);text-shadow:0 0 8px #ff1133;}
.timer-track{width:100%;height:clamp(8px,2.5vw,11px);background:#04040c;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.timer-bar{height:100%;border-radius:6px;transition:background .2s;background:var(--green);box-shadow:0 0 10px var(--green);}
.timer-bar.warn  {background:var(--yellow);box-shadow:0 0 10px var(--yellow);}
.timer-bar.danger{background:var(--red);box-shadow:0 0 16px var(--red);animation:tbar-pulse .25s ease-in-out infinite alternate;}
@keyframes tbar-pulse{from{box-shadow:0 0 8px var(--red)}to{box-shadow:0 0 22px #ff1133,0 0 44px #ff113366}}

/* ── BUTTON ZONE ── */
.btn-zone{position:relative;width:100%;flex:0 0 clamp(130px,35vw,160px);display:flex;align-items:center;justify-content:center;margin:clamp(4px,1.5vw,8px) 0 clamp(3px,1vw,6px);}

#pb{
  width:clamp(110px,28vw,134px);height:clamp(110px,28vw,134px);
  border-radius:50%;border:none;cursor:pointer;
  font-family:'Bebas Neue',sans-serif;font-size:clamp(17px,4.5vw,21px);letter-spacing:2px;
  outline:none;position:absolute;
  background:radial-gradient(circle at 36% 30%,#ff7788,#cc0022);
  color:#fff;text-shadow:0 2px 5px rgba(0,0,0,.7);
  box-shadow:0 8px 0 #88000e,0 12px 28px rgba(255,17,51,.55),inset 0 1px 0 rgba(255,255,255,.32),inset 0 -2px 0 rgba(0,0,0,.25);
  transition:transform .07s,box-shadow .07s,width .15s,height .15s,font-size .15s;
  will-change:transform;
  /* Prevent long-press context menu on mobile */
  -webkit-touch-callout:none;
}
#pb::before{content:'';position:absolute;inset:4px;border-radius:50%;border:1px solid rgba(255,255,255,.12);pointer-events:none;}
#pb::after {content:'';position:absolute;top:13%;left:19%;width:37%;height:26%;background:radial-gradient(ellipse,rgba(255,255,255,.38),transparent);border-radius:50%;pointer-events:none;}
#pb:active,#pb.pressed{transform:translateY(7px) scale(.97) !important;box-shadow:0 1px 0 #88000e,0 3px 10px rgba(255,17,51,.3),inset 0 3px 6px rgba(0,0,0,.35) !important;}
#pb.blue  {background:radial-gradient(circle at 36% 30%,#66bbff,#0044cc);box-shadow:0 8px 0 #002299,0 12px 28px rgba(0,80,255,.55),inset 0 1px 0 rgba(255,255,255,.32);}
#pb.green {background:radial-gradient(circle at 36% 30%,#66ff99,#009933);color:#001800;box-shadow:0 8px 0 #005511,0 12px 28px rgba(0,180,50,.55),inset 0 1px 0 rgba(255,255,255,.32);}
#pb.yellow{background:radial-gradient(circle at 36% 30%,#ffee66,#bb8800);color:#110900;box-shadow:0 8px 0 #775500,0 12px 28px rgba(180,140,0,.55),inset 0 1px 0 rgba(255,255,255,.32);}
#pb.purple{background:radial-gradient(circle at 36% 30%,#ee66ff,#880099);box-shadow:0 8px 0 #440055,0 12px 28px rgba(160,0,220,.55),inset 0 1px 0 rgba(255,255,255,.32);}
#pb.shrunken{width:72px !important;height:72px !important;font-size:12px !important;}
#pb.grown   {width:clamp(140px,38vw,162px) !important;height:clamp(140px,38vw,162px) !important;font-size:clamp(20px,5vw,24px) !important;}
#pb.spinning{animation:pb-spin .6s linear infinite !important;}
@keyframes pb-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
#pb.danger-pulse{animation:pb-danger .22s ease-in-out infinite alternate !important;}
@keyframes pb-danger{from{box-shadow:0 8px 0 #88000e,0 12px 28px rgba(255,17,51,.55),inset 0 1px 0 rgba(255,255,255,.32)}to{box-shadow:0 8px 0 #88000e,0 12px 55px rgba(255,17,51,1),0 0 38px rgba(255,17,51,.6),inset 0 1px 0 rgba(255,255,255,.32)}}
#pb.teleport-out{opacity:0;transform:scale(0) !important;}

/* decoys */
.decoy{width:68px;height:68px;border-radius:50%;border:none;cursor:pointer;position:absolute;font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1px;box-shadow:0 4px 0 rgba(0,0,0,.5),0 7px 14px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.2);outline:none;animation:decoy-in .15s ease-out;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5);-webkit-touch-callout:none;}
.decoy:active{transform:translateY(3px) !important;}
@keyframes decoy-in{from{transform:scale(0) rotate(-15deg);opacity:0}to{transform:scale(1);opacity:1}}

/* combo */
.combo-lbl{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);font-family:'Bebas Neue',sans-serif;font-size:clamp(11px,3vw,14px);letter-spacing:4px;color:var(--orange);text-shadow:0 0 10px #ff5500;white-space:nowrap;opacity:0;pointer-events:none;}
@keyframes cl-in{0%{opacity:0;transform:translateX(-50%) scale(.4)}35%{opacity:1;transform:translateX(-50%) scale(1.25)}100%{opacity:1;transform:translateX(-50%) scale(1)}}
.combo-lbl.show{animation:cl-in .3s ease-out forwards;}

/* ── OVERLAYS ── */
.flash-ov{position:absolute;inset:0;pointer-events:none;opacity:0;z-index:91;border-radius:inherit;transition:opacity .07s;}
.flash-ov.fg{background:rgba(45,255,0,.2);  opacity:1;}
.flash-ov.fr{background:rgba(255,17,51,.28); opacity:1;}
.flash-ov.fy{background:rgba(255,229,0,.22); opacity:1;}
.flash-ov.fb{background:rgba(0,200,255,.18); opacity:1;}
.flash-ov.fw{background:rgba(255,255,255,.15);opacity:1;}

.frenzy-ring{position:absolute;inset:-3px;border-radius:21px;border:3px solid var(--red);opacity:0;pointer-events:none;z-index:92;}
.frenzy-ring.on{opacity:1;animation:fr-pulse .35s ease-in-out infinite alternate;}
@keyframes fr-pulse{from{box-shadow:0 0 12px #ff1133,inset 0 0 12px #ff113322}to{box-shadow:0 0 35px #ff1133,0 0 60px #ff113355,inset 0 0 20px #ff113333}}

.sp-ban{position:absolute;top:62px;left:50%;transform:translateX(-50%);font-family:'Bebas Neue',sans-serif;font-size:clamp(10px,3vw,13px);letter-spacing:3px;padding:3px 14px;border-radius:3px;z-index:88;opacity:0;pointer-events:none;white-space:nowrap;transition:opacity .2s;}
.sp-ban.bonus  {background:var(--yellow);color:#000;}
.sp-ban.reverse{background:var(--purple);color:#fff;}
.sp-ban.frenzy {background:var(--red);color:#fff;animation:fban-flash .18s ease-in-out infinite alternate;}
.sp-ban.silent {background:var(--cyan);color:#000;}
@keyframes fban-flash{from{background:#ff1133}to{background:#ff6600}}
.sp-ban.on{opacity:1;}

.pts-float{position:absolute;font-family:'Bebas Neue',sans-serif;font-size:clamp(24px,7vw,32px);letter-spacing:2px;color:var(--green);text-shadow:0 0 12px #2dff00;pointer-events:none;opacity:0;z-index:200;}
@keyframes pf{0%{opacity:0;transform:translateY(0) scale(.5)}20%{opacity:1;transform:translateY(-16px) scale(1.15)}75%{opacity:1;transform:translateY(-50px) scale(1)}100%{opacity:0;transform:translateY(-68px) scale(.85)}}
.pts-float.pop{animation:pf .8s ease-out forwards;}

.big-mult{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);font-family:'Bebas Neue',sans-serif;font-size:clamp(70px,20vw,110px);letter-spacing:4px;color:var(--yellow);text-shadow:0 0 16px #ffe500,0 0 50px #ffe50088;pointer-events:none;opacity:0;z-index:200;}
@keyframes bm{0%{opacity:0;transform:translate(-50%,-50%) scale(.2) rotate(-15deg)}35%{opacity:1;transform:translate(-50%,-60%) scale(1.4) rotate(4deg)}65%{opacity:1;transform:translate(-50%,-65%) scale(1.05) rotate(-1deg)}100%{opacity:0;transform:translate(-50%,-95%) scale(.8)}}
.big-mult.pop{animation:bm 1.1s ease-out forwards;}

/* ── FEEDBACK ── */
.feedback{height:20px;font-size:clamp(10px,3vw,12px);letter-spacing:3px;text-align:center;text-transform:uppercase;opacity:0;transition:opacity .2s;flex-shrink:0;}
.feedback.show{opacity:1;}
.feedback.ok   {color:var(--green); text-shadow:0 0 8px #2dff00;}
.feedback.bad  {color:var(--red);   text-shadow:0 0 8px #ff1133;}
.feedback.bonus{color:var(--yellow);text-shadow:0 0 8px #ffe500;}

/* ── LAST CHANCE ── */
.lc-ov{position:absolute;inset:0;z-index:150;border-radius:inherit;pointer-events:none;display:flex;align-items:center;justify-content:center;opacity:0;}
.lc-ov.show{animation:lc-flash .6s ease-out forwards;}
@keyframes lc-flash{0%{opacity:0;background:rgba(255,17,51,0)}20%{opacity:1;background:rgba(255,17,51,.35)}60%{opacity:1;background:rgba(255,17,51,.15)}100%{opacity:0;background:rgba(255,17,51,0)}}
.lc-txt{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,12vw,60px);letter-spacing:5px;color:#fff;text-shadow:0 0 30px #ff1133,0 0 60px #ff1133;pointer-events:none;opacity:0;}
.lc-ov.show .lc-txt{animation:lc-txt .6s ease-out forwards;}
@keyframes lc-txt{0%{opacity:0;transform:scale(2)}30%{opacity:1;transform:scale(1.1)}70%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.9)}}

/* ── SCREENS ── */
.screen{position:absolute;inset:0;background:var(--panel);border-radius:inherit;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:250;padding:clamp(20px,5vw,30px) clamp(16px,5vw,28px);text-align:center;gap:clamp(8px,2.5vw,12px);overflow-y:auto;}
.screen.off{display:none;}
.s-logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,14vw,72px);letter-spacing:7px;color:var(--red);text-shadow:0 0 14px #ff1133,0 0 50px #ff113388;line-height:.9;}
.s-sub {font-size:clamp(8px,2.5vw,10px);letter-spacing:3px;color:var(--dim);text-transform:uppercase;line-height:2.0;max-width:300px;}
.tips-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 14px;}
.tip{font-size:clamp(7px,2vw,9px);letter-spacing:1px;color:var(--dim);text-transform:uppercase;display:flex;align-items:center;gap:5px;}
.tip::before{content:'▸';color:var(--cyan);}
.hs-panel{background:#04040c;border:1px solid var(--border);border-radius:8px;padding:7px 20px;}
.hs-lbl{font-size:clamp(7px,2vw,9px);letter-spacing:3px;color:var(--dim);display:block;margin-bottom:1px;text-transform:uppercase;}
.hs-num{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,10vw,40px);color:var(--cyan);text-shadow:0 0 12px #00eeff;line-height:1;}
.btn-cta{background:none;border:2px solid var(--cyan);color:var(--cyan);font-family:'Bebas Neue',sans-serif;font-size:clamp(20px,6vw,26px);letter-spacing:7px;padding:clamp(10px,3vw,14px) clamp(28px,8vw,40px);cursor:pointer;border-radius:4px;text-shadow:0 0 10px #00eeff;box-shadow:0 0 16px rgba(0,238,255,.18);transition:all .15s;-webkit-tap-highlight-color:transparent;}
.btn-cta:active{background:rgba(0,238,255,.12);box-shadow:0 0 28px rgba(0,238,255,.5);transform:scale(.97);}

/* game over */
.go-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(42px,12vw,64px);letter-spacing:5px;color:var(--red);text-shadow:0 0 14px #ff1133,0 0 50px #ff113388;animation:go-blink .7s ease-in-out infinite;}
@keyframes go-blink{0%,100%{opacity:1}50%{opacity:.5}}
.go-msg {font-family:'Black Han Sans',sans-serif;font-size:clamp(13px,4vw,20px);color:var(--yellow);text-shadow:0 0 8px #ffe500;letter-spacing:2px;}
.go-scrs{display:flex;gap:12px;margin:3px 0;}
.go-sbox{background:#04040c;border:1px solid var(--border);border-radius:8px;padding:8px 14px;min-width:85px;}
.go-slbl{font-size:clamp(7px,2vw,9px);letter-spacing:2px;color:var(--dim);display:block;margin-bottom:2px;text-transform:uppercase;}
.go-sval{font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,10vw,44px);line-height:1;color:var(--cyan);text-shadow:0 0 12px #00eeff;}
.go-rank{font-size:clamp(9px,2.5vw,11px);letter-spacing:3px;color:var(--purple);text-shadow:0 0 10px #cc00ff;text-transform:uppercase;}
.go-died{font-size:clamp(8px,2.2vw,9px);letter-spacing:2px;color:var(--dim);}
.new-best-badge{font-size:clamp(9px,2.5vw,11px);letter-spacing:4px;color:var(--green);text-shadow:0 0 12px #2dff00;animation:nb .5s ease-out;}
@keyframes nb{0%{opacity:0;transform:scale(.3)}60%{transform:scale(1.25)}100%{opacity:1;transform:scale(1)}}

.corner{position:absolute;width:12px;height:12px;opacity:.16;}
.c-tl{top:7px;left:7px;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan);}
.c-tr{top:7px;right:7px;border-top:2px solid var(--cyan);border-right:2px solid var(--cyan);}
.c-bl{bottom:7px;left:7px;border-bottom:2px solid var(--cyan);border-left:2px solid var(--cyan);}
.c-br{bottom:7px;right:7px;border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan);}
.hidden{display:none!important;}

/* ── SWIPE ARROW INDICATOR ── */
.swipe-arrow{position:absolute;font-size:clamp(28px,8vw,38px);pointer-events:none;opacity:0;z-index:201;}
@keyframes arrow-up   {0%{opacity:0;transform:translateY(0)}20%{opacity:1}80%{opacity:1}100%{opacity:0;transform:translateY(-50px)}}
@keyframes arrow-down {0%{opacity:0;transform:translateY(0)}20%{opacity:1}80%{opacity:1}100%{opacity:0;transform:translateY(50px)}}
@keyframes arrow-left {0%{opacity:0;transform:translateX(0)}20%{opacity:1}80%{opacity:1}100%{opacity:0;transform:translateX(-50px)}}
@keyframes arrow-right{0%{opacity:0;transform:translateX(0)}20%{opacity:1}80%{opacity:1}100%{opacity:0;transform:translateX(50px)}}
.swipe-arrow.up   {animation:arrow-up    .8s ease-out forwards;}
.swipe-arrow.down {animation:arrow-down  .8s ease-out forwards;}
.swipe-arrow.left {animation:arrow-left  .8s ease-out forwards;}
.swipe-arrow.right{animation:arrow-right .8s ease-out forwards;}
</style>

<div id="app">

<script>
'use strict';

// ══════════════════════════════════════
//  DEVICE DETECTION
// ══════════════════════════════════════
const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

// ══════════════════════════════════════
//  VIBRATION
// ══════════════════════════════════════
function vib(pattern) { try { if(navigator.vibrate) navigator.vibrate(pattern); } catch(e){} }
function vibOK()      { vib(30); }
function vibWrong()   { vib([60,30,120]); }
function vibCombo()   { vib([20,20,40]); }
function vibLastCh()  { vib([100,50,100,50,200]); }

// ══════════════════════════════════════
//  BACKGROUND CANVAS
// ══════════════════════════════════════
const bgCvs=document.getElementById('bgcanvas'), bgCtx=bgCvs.getContext('2d');
let BW,BH,bgIntensity=0;
function resizeBG(){BW=bgCvs.width=innerWidth;BH=bgCvs.height=innerHeight;}
resizeBG(); addEventListener('resize',resizeBG);

const PCOLS=['#ff1133','#00eeff','#cc00ff','#2dff00','#ffe500','#ff5500'];
const pts=Array.from({length:70},()=>({x:Math.random()*2000,y:Math.random()*2000,vx:(Math.random()-.5)*.22,vy:(Math.random()-.5)*.22,r:Math.random()*1.5+.4,col:PCOLS[Math.floor(Math.random()*PCOLS.length)],phase:Math.random()*Math.PI*2}));

const EKG_LEN=80; const ekgPts=new Array(EKG_LEN).fill(0); let ekgPhase=0,ekgPanic=0;
function drawBG(){
  requestAnimationFrame(drawBG);
  bgCtx.clearRect(0,0,BW,BH);
  const spd=1+bgIntensity*6;
  for(const p of pts){
    p.x+=p.vx*spd;p.y+=p.vy*spd;p.phase+=.01*spd;
    if(p.x<0)p.x=BW;if(p.x>BW)p.x=0;if(p.y<0)p.y=BH;if(p.y>BH)p.y=0;
    const a=(.18+.3*Math.sin(p.phase))*(.18+bgIntensity*.55);
    bgCtx.beginPath();bgCtx.arc(p.x,p.y,p.r*(1+bgIntensity*.8),0,Math.PI*2);
    bgCtx.fillStyle=p.col+Math.floor(a*255).toString(16).padStart(2,'0');bgCtx.fill();
  }
  ekgPhase+=(.02+ekgPanic*.08)*spd;
  for(let i=EKG_LEN-1;i>0;i--)ekgPts[i]=ekgPts[i-1];
  ekgPts[0]=(Math.sin(ekgPhase*3)>.94)?(Math.sin(ekgPhase*30)*40*ekgPanic):Math.sin(ekgPhase)*4*ekgPanic;
  if(ekgPanic>.1){
    const ex=BW*.5-EKG_LEN*3,ey=BH-40;
    bgCtx.beginPath();
    for(let i=0;i<EKG_LEN;i++){const x=ex+i*6,y=ey-ekgPts[i];i===0?bgCtx.moveTo(x,y):bgCtx.lineTo(x,y);}
    bgCtx.strokeStyle=`rgba(255,17,51,${Math.min(ekgPanic,.8)})`;bgCtx.lineWidth=1.5;bgCtx.shadowColor='#ff1133';bgCtx.shadowBlur=6*ekgPanic;bgCtx.stroke();bgCtx.shadowBlur=0;
  }
}
drawBG();

// Corruption canvas
const corCvs=document.getElementById('corrupt'),corCtx=corCvs.getContext('2d');
let corruptLevel=0;
function drawCorrupt(){
  corCtx.clearRect(0,0,440,780);
  if(corruptLevel<=0)return;
  const n=Math.floor(corruptLevel*14);
  for(let i=0;i<n;i++){
    const x=Math.random()*440,y=Math.random()*780,w=Math.random()*90+10,h=Math.random()*5+2;
    corCtx.fillStyle=`rgba(${Math.floor(Math.random()*255)},0,${Math.floor(Math.random()*255)},${corruptLevel*.28})`;
    corCtx.fillRect(x,y,w,h);
  }
}
setInterval(drawCorrupt,80);

// ══════════════════════════════════════
//  AUDIO
// ══════════════════════════════════════
let AC=null;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC;}
function beep(f,t,d,v,delay=0){try{const ctx=getAC(),o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type=t;o.frequency.setValueAtTime(f,ctx.currentTime+delay);g.gain.setValueAtTime(v,ctx.currentTime+delay);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+delay+d);o.start(ctx.currentTime+delay);o.stop(ctx.currentTime+delay+d+.02);}catch(e){}}
function noise(d=.05,v=.2,delay=0){try{const ctx=getAC(),buf=ctx.createBuffer(1,ctx.sampleRate*d,ctx.sampleRate),data=buf.getChannelData(0);for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*.9;const src=ctx.createBufferSource(),g=ctx.createGain();src.buffer=buf;src.connect(g);g.connect(ctx.destination);g.gain.setValueAtTime(v,ctx.currentTime+delay);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+delay+d);src.start(ctx.currentTime+delay);}catch(e){}}

const S={
  ok:    ()=>{beep(480,'sine',.05,.14);beep(680,'sine',.07,.17,.06);beep(920,'sine',.09,.14,.12);},
  bonus: ()=>{beep(440,'sine',.04,.18);beep(550,'sine',.04,.2,.05);beep(660,'sine',.04,.2,.1);beep(880,'sine',.07,.22,.16);beep(1100,'sine',.1,.2,.24);noise(.04,.1,.28);},
  wrong: ()=>{noise(.1,.35);beep(180,'sawtooth',.18,.45);beep(120,'sawtooth',.22,.38,.16);beep(80,'sawtooth',.28,.3,.32);},
  tick:  ()=>{beep(1100,'square',.022,.12);},
  warn:  ()=>{beep(800,'square',.04,.2);beep(650,'square',.04,.17,.08);},
  combo: ()=>{beep(660,'sine',.04,.2);beep(880,'sine',.05,.2,.05);beep(1100,'sine',.07,.18,.1);beep(1320,'sine',.08,.16,.16);},
  click: ()=>{noise(.015,.1);beep(1500,'square',.012,.04);},
  tele:  ()=>{beep(350,'sine',.04,.18);beep(900,'sine',.03,.12,.05);noise(.02,.08,.03);},
  life:  ()=>{beep(280,'sawtooth',.1,.3);beep(190,'sawtooth',.14,.25,.1);noise(.06,.15,.08);},
  hb:    ()=>{beep(75,'sine',.08,.35);beep(65,'sine',.07,.25,.17);},
  frenzy:()=>{noise(.05,.25);beep(180,'sawtooth',.1,.3);beep(250,'square',.08,.2,.08);},
  rank:  ()=>{beep(440,'sine',.06,.2);beep(554,'sine',.06,.2,.07);beep(659,'sine',.07,.2,.14);beep(880,'sine',.12,.22,.21);},
  lastch:()=>{noise(.12,.4);beep(160,'sawtooth',.2,.4);beep(100,'sawtooth',.25,.35,.18);},
  sbr:   ()=>{noise(.15,.5);beep(100,'sawtooth',.2,.5);beep(60,'sawtooth',.3,.4,.15);},
};

let hbTO=null;
function startHB(dur){
  stopHB();let e=0;
  function beat(){if(!gameActive)return;e++;const pct=Math.max(0,1-e/(dur/100));if(pct<.4){S.hb();hbEl.classList.remove('pulse');void hbEl.offsetWidth;hbEl.classList.add('pulse');ekgPanic=Math.max(0,1-pct*2.5);}
  const next=pct<.08?130:pct<.18?190:pct<.3?270:pct<.4?360:null;if(next)hbTO=setTimeout(beat,next);}
  hbTO=setTimeout(beat,dur*.6);
}
function stopHB(){clearTimeout(hbTO);ekgPanic=0;}

// ══════════════════════════════════════
//  GAME DATA
// ══════════════════════════════════════
const RANKS=[{min:0,t:'BEGINNER'},{min:5,t:'TWITCHY'},{min:12,t:'PANIC SURVIVOR'},{min:22,t:'CHAOS MASTER'},{min:38,t:'MIND NINJA'},{min:55,t:'BUTTON GOD'},{min:80,t:'OMNIPANIC'}];

const FRENZY_DESKTOP=[{text:'CLICK!',type:'click',col:'cr'},{text:'WAIT!',type:'wait',col:'cy'},{text:'SPACE!',type:'space',col:'cy2'},{text:'SMASH!',type:'click',col:'cr'},{text:"DON'T!",type:'wait',col:'cp'},{text:'HIT!',type:'click',col:'cr'},{text:'STOP!',type:'wait',col:'cy'},{text:'GO!!',type:'click',col:'cr'}];

let INSTS, FRENZY_INSTS;

const BTN_LBLS={
  click:       ['PANIC!','TAP ME!','HIT IT!','SMASH!','GO!','DO IT!','NOW!'],
  wait:        ["NO TOUCH","WAIT...","DON'T!","STOP!","RESIST!","FREEZE!","NOPE!"],

  move:        ['SHAKE!','MOVE!','WIGGLE!'],

  space:       ['SPACEBAR!','PRESS!','HIT SPACE'],
  enter:       ['ENTER!','RETURN!','CONFIRM!'],
  key_a:       ['THE A KEY','PRESS A!','A!!'],

const rand=a=>a[Math.floor(Math.random()*a.length)];
const pick=(a,x)=>{const f=a.filter(i=>i!==x);return rand(f.length?f:a);};

function updateScoreUI(){svalEl.textContent=score;bestSval.textContent=bestScore;rankLbl.textContent=getRank(score);svalEl.classList.add('pop');setTimeout(()=>svalEl.classList.remove('pop'),170);bgIntensity=Math.min(score/32,1);corruptLevel=Math.max(0,(score-25)/30);}
function updateLives(){lifeEls.forEach((el,i)=>el.classList.toggle('lost',i>=lives));}
function updateStreak(){const pct=Math.min(streak/STREAK_BONUS_AT,1)*100;stkFill.style.width=pct+'%';stkVal.textContent=streak;const hot=streak>=STREAK_BONUS_AT;stkFill.classList.toggle('hot',hot);stkVal.classList.toggle('hot',hot);}
function doFlash(cls){flashOv.className='flash-ov '+cls;setTimeout(()=>flashOv.className='flash-ov',300);}
function doShake(){cab.classList.remove('shake');void cab.offsetWidth;cab.classList.add('shake');setTimeout(()=>cab.classList.remove('shake'),420);}
function chromaOn(){cab.classList.add('chroma');}function chromaOff(){cab.classList.remove('chroma');}
function showFB(msg,cls){feedbackEl.textContent=msg;feedbackEl.className='feedback show '+cls;setTimeout(()=>feedbackEl.className='feedback',850);}
function floatPts(txt,ex,ey){const r=cab.getBoundingClientRect();ptsFloat.textContent=txt;ptsFloat.style.left=(ex-r.left-18)+'px';ptsFloat.style.top=(ey-r.top-18)+'px';ptsFloat.className='pts-float pop';setTimeout(()=>ptsFloat.className='pts-float',850);}
function showMult(txt){bigMult.textContent=txt;bigMult.classList.remove('pop');void bigMult.offsetWidth;bigMult.classList.add('pop');setTimeout(()=>bigMult.classList.remove('pop'),1150);}
function showCombo(n){if(n<2)return;comboLbl.textContent=n>=STREAK_BONUS_AT?`🔥 ×${n} STREAK — BONUS!`:`🔥 STREAK ×${n}`;comboLbl.classList.remove('show');void comboLbl.offsetWidth;comboLbl.classList.add('show');if(n%STREAK_BONUS_AT===0){S.combo();vibCombo();}setTimeout(()=>comboLbl.classList.remove('show'),1400);}
function showNearMiss(){nearMissEl.textContent=rand(['⚡ NEAR MISS!','😬 CLOSE ONE…','⏱ BARELY!']);nearMissEl.classList.remove('show');void nearMissEl.offsetWidth;nearMissEl.classList.add('show');setTimeout(()=>nearMissEl.classList.remove('show'),1050);}
function showGlitch(txt){glitchTxt.textContent=txt;glitchTxt.classList.remove('show');void glitchTxt.offsetWidth;glitchTxt.classList.add('show');setTimeout(()=>glitchTxt.classList.remove('show'),650);}
function showLastChance(){lcTxt.textContent='LAST CHANCE';lcOv.classList.remove('show');void lcOv.offsetWidth;lcOv.classList.add('show');S.lastch();vibLastCh();setTimeout(()=>lcOv.classList.remove('show'),650);}
function showSwipeArrow(dir){const arrows={swipe_up:'⬆',swipe_down:'⬇',swipe_left:'⬅',swipe_right:'➡'};swipeArrow.textContent=arrows[dir]||'';swipeArrow.className='swipe-arrow '+(dir.replace('swipe_',''));setTimeout(()=>swipeArrow.className='swipe-arrow',850);}

function startTaunt(dur){
  clearTimeout(tauntTO);
  const hot=dur<900,pool=hot?TAUNTS_HOT:TAUNTS_IDLE;
  const at=dur*(.3+Math.random()*.3);
  tauntTO=setTimeout(()=>{if(roundEnded)return;const pct=1-(performance.now()-timerStart)/timerDur;if(pct<.1)return;tauntEl.textContent=rand(pool);tauntEl.classList.toggle('hot',hot);setTimeout(()=>{tauntEl.textContent='';tauntEl.classList.remove('hot');},dur*.35);},at);
}

function resetButton(){pb.style.position='';pb.style.left='';pb.style.top='';pb.className='';document.querySelectorAll('.decoy').forEach(d=>d.remove());cancelAnimationFrame(holdRAF);holdRingEl.classList.remove('show');hrFill.style.strokeDashoffset='113';}

function setInst(inst,anim='appear'){
  if(anim==='leave'){instEl.classList.add('leaving');setTimeout(()=>{instEl.textContent=inst.text;instEl.className='inst '+inst.col+' appear';},150);}
  else{instEl.textContent=inst.text;instEl.className='inst '+inst.col+' '+anim;}
}

function clearAllTimers(){cancelAnimationFrame(timerRAF);clearTimeout(waitTO);clearTimeout(switchTO);clearTimeout(holdTO);clearTimeout(tauntTO);cancelAnimationFrame(holdRAF);stopHB();holdRingEl.classList.remove('show');}

// ══════════════════════════════════════
//  HOLD PROGRESS (for hold_btn + hold_space)
// ══════════════════════════════════════
const HOLD_DUR = 500;
const RING_CIRC = 113.1;
function startHoldProgress(){
  holdProgress=0;holdRingEl.classList.add('show');
  const start=performance.now();
  function tick(){
    holdProgress=Math.min(1,(performance.now()-start)/HOLD_DUR);
    hrFill.style.strokeDashoffset=(RING_CIRC*(1-holdProgress)).toFixed(2);
    if(holdProgress<1&&holdActive)holdRAF=requestAnimationFrame(tick);
  }
  holdRAF=requestAnimationFrame(tick);
}

// ══════════════════════════════════════
//  TIMER
// ══════════════════════════════════════
function startTimer(dur){
  clearAllTimers();timerDur=dur;timerStart=performance.now();roundEnded=false;mouseDist=0;nearMissShown=false;lastPctVal=1;swipeHandled=false;touchMoved=false;
  startHB(dur);startTaunt(dur);
  function tick(){
    const el=performance.now()-timerStart,pct=Math.max(0,1-el/dur),rem=Math.max(0,(dur-el)/1000);
    tbarEl.style.width=(pct*100)+'%';timerNumEl.textContent=rem.toFixed(1)+'s';
    if(pct<.18){tbarEl.className='timer-bar danger';timerNumEl.className='timer-num danger';chromaOn();instEl.classList.add('jitter');if(curInst&&curInst.type==='click')pb.classList.add('danger-pulse');}
    else if(pct<.45){tbarEl.className='timer-bar warn';timerNumEl.className='timer-num warn';chromaOff();instEl.classList.remove('jitter');pb.classList.remove('danger-pulse');}
    else{tbarEl.className='timer-bar';timerNumEl.className='timer-num';chromaOff();instEl.classList.remove('jitter');pb.classList.remove('danger-pulse');}
    if(!nearMissShown&&pct<.13&&pct>.04&&curInst&&curInst.type!=='wait'){nearMissShown=true;showNearMiss();S.warn();}
    if(lastPctVal>=.35&&pct<.35)S.tick();
    lastPctVal=pct;
    if(el>=dur){tbarEl.style.width='0%';chromaOff();instEl.classList.remove('jitter');pb.classList.remove('danger-pulse');handleTimeout();}
    else timerRAF=requestAnimationFrame(tick);
  }
  timerRAF=requestAnimationFrame(tick);
}

// ══════════════════════════════════════
//  ROUND
// ══════════════════════════════════════
function startRound(){
  if(!gameActive)return;
  resetButton();holdActive=false;holdDone=false;dblGuard=false;tripleCount=0;clearTimeout(tripleTO);roundN++;
  const diff=getDiff(score);
  diffPill.textContent=diff.name;diffPill.className='diff-pill '+diff.cls;

  // Frenzy every 10 rounds (score≥10)
  if(score>=10&&roundN%10===0){launchFrenzy(diff);return;}

  // Special every 7
  specialRound=(roundN>1&&roundN%7===0)?(Math.random()<.55?'bonus':'reverse'):null;
  if(specialRound==='bonus'){spBan.textContent='⚡ BONUS ROUND — ×3';spBan.className='sp-ban bonus on';setTimeout(()=>spBan.classList.remove('on'),2400);}
  else if(specialRound==='reverse'){spBan.textContent='🔄 REVERSE ROUND';spBan.className='sp-ban reverse on';setTimeout(()=>spBan.classList.remove('on'),2400);}

  // Silent round every 15 (score≥15)
  const isSilent=score>=15&&roundN%15===0;

  let inst=pick(INSTS,prevInst);prevInst=inst;
  if(specialRound==='reverse'){inst={...inst};if(inst.type==='click'){inst.type='wait';inst.text+=' (NOPE!)';inst.col='cy';}else if(inst.type==='wait'){inst.type='click';inst.text='ACTUALLY: '+(isMobile?'TAP IT!':'HIT IT!');inst.col='cr';}}
  curInst=inst;

  subInstEl.textContent=roundN<=8?(inst.hint||''):'';

  // Button label + distractor color
  const lblPool=BTN_LBLS[inst.type]||BTN_LBLS.click;
  pb.textContent=rand(lblPool);
  pb.className=(score>=3&&Math.random()<.32)?rand(BTN_COLS.filter(c=>c!=='')):'';

  // Tricks
  if(score>=12&&Math.random()<.22){if(Math.random()<.5)pb.classList.add('shrunken');else pb.classList.add('grown');}
  if(score>=18&&inst.type==='wait'&&Math.random()<.25)pb.classList.add('spinning');
  if(score>=10&&(inst.type==='click'||inst.type==='dblclick'||inst.type==='tripleclick')&&Math.random()<.3)doTeleport();
  if(score>=20&&inst.type==='click'&&Math.random()<.28)spawnDecoys(2);
  if(score>=30&&inst.type==='click'&&Math.random()<.22)spawnDecoys(1);

  // Mid-switch
  if(score>=5&&Math.random()<.28)scheduleSwitch(diff.ms);

  // Show swipe hint arrow
  if(['swipe_up','swipe_down','swipe_left','swipe_right'].includes(inst.type))showSwipeArrow(inst.type);

  if(isSilent){
    spBan.textContent='🤫 SILENT ROUND';spBan.className='sp-ban silent on';setTimeout(()=>spBan.classList.remove('on'),2000);
    instEl.textContent='';instEl.className='inst';
    setTimeout(()=>{if(!roundEnded){setInst(inst,'appear');S.sbr();}},550);
  }else{
    setInst(inst);
  }

  const mult=calcMult();
  if(inst.type==='wait')waitTO=setTimeout(()=>{if(!roundEnded)doCorrect(null,mult);},diff.ms-100);
  startTimer(diff.ms);
}

function calcMult(){return(specialRound==='bonus'?3:1)+Math.floor(streak/STREAK_BONUS_AT);}

function doTeleport(){S.tele();pb.classList.add('teleport-out');setTimeout(()=>{const z=btnZone.getBoundingClientRect(),m=14,bw=pb.offsetWidth||120,bh=pb.offsetHeight||120;const nx=m+Math.random()*Math.max(4,z.width-bw-m*2),ny=m+Math.random()*Math.max(4,z.height-bh-m*2);pb.style.position='absolute';pb.style.left=nx+'px';pb.style.top=ny+'px';pb.classList.remove('teleport-out');},100);}

function spawnDecoys(count){
  for(let i=0;i<count;i++){
    const d=document.createElement('button');d.className='decoy';
    d.classList.add(rand(['blue','green','yellow','purple']));
    d.textContent=rand(['FAKE','NOPE',"DON'T",'TRAP','WRONG','FALSE']);
    d.style.background=`radial-gradient(circle at 35% 30%,${rand(['#66aaff','#66ff99','#ffee66','#ee66ff'])},${rand(['#003388','#006622','#885500','#550077'])})`;
    const z=btnZone.getBoundingClientRect();
    d.style.position='absolute';d.style.left=(10+Math.random()*(z.width-88))+'px';d.style.top=(10+Math.random()*(z.height-88))+'px';
    const kill=e=>{e.preventDefault();e.stopPropagation();if(!gameActive||roundEnded)return;handleWrong();};
    d.addEventListener('click',kill);d.addEventListener('touchend',kill,{passive:false});
    btnZone.appendChild(d);
  }
}

function scheduleSwitch(total){
  const at=total*(.32+Math.random()*.28);
  switchTO=setTimeout(()=>{
    if(roundEnded)return;
    const nt=Math.random()<.5?'click':'wait';
    const STXT={click:['CLICK NOW!!!','NOW!!!','HIT IT!!!!','GO GO GO!','DO IT!!','TAP TAP TAP!'],wait:["WAIT!","STOP!","FREEZE!","DON'T TOUCH!","HANDS OFF!!"]};
    const ni={text:rand(STXT[nt]),type:nt,col:nt==='click'?'cr':'cy',hint:''};
    curInst=ni;setInst(ni,'leave');clearTimeout(waitTO);
    if(ni.type==='wait'){const rem=total-at,m=calcMult();waitTO=setTimeout(()=>{if(!roundEnded)doCorrect(null,m);},rem-100);}
    showGlitch(ni.text);S.tick();
  },at);
}

// ── FRENZY ──
function launchFrenzy(diff){isFrenzy=true;frenzyCount=6+Math.floor(score/12)*2;frenzyDone=0;frRing.classList.add('on');spBan.textContent='⚠ FRENZY MODE ⚠';spBan.className='sp-ban frenzy on';doFlash('fr');S.frenzy();vib([30,20,30,20,60]);setTimeout(()=>runFrenzyRound(diff),350);}
function runFrenzyRound(diff){if(!gameActive)return;if(frenzyDone>=frenzyCount){endFrenzy();return;}resetButton();holdActive=false;holdDone=false;dblGuard=false;mouseDist=0;roundEnded=false;const inst=rand(FRENZY_INSTS);curInst=inst;specialRound='frenzy';subInstEl.textContent='';pb.textContent=rand(BTN_LBLS[inst.type]||BTN_LBLS.click);pb.className=rand(BTN_COLS);setInst(inst);const ft=Math.max(320,diff.ms*.5);if(inst.type==='wait')waitTO=setTimeout(()=>{if(!roundEnded)frenzyOK();},ft-80);startTimer(ft);}
function frenzyOK(){if(roundEnded)return;roundEnded=true;clearAllTimers();S.ok();vibOK();const earned=1+Math.floor(streak/STREAK_BONUS_AT);score+=earned;if(score>bestScore)bestScore=score;localStorage.setItem('pb_best',bestScore);streak++;updateScoreUI();updateStreak();doFlash('fg');frenzyDone++;showFB('✓','ok');setTimeout(()=>runFrenzyRound(getDiff(score)),110);}
function frenzyWrong(){if(roundEnded)return;roundEnded=true;clearAllTimers();endFrenzy();loseLife();}
function endFrenzy(){isFrenzy=false;frRing.classList.remove('on');spBan.classList.remove('on');spBan.textContent='';if(!gameActive)return;setTimeout(startRound,400);}

// ══════════════════════════════════════
//  CORRECT / WRONG / TIMEOUT
// ══════════════════════════════════════
function doCorrect(ev,multOverride){
  if(roundEnded)return;if(isFrenzy){frenzyOK();return;}
  roundEnded=true;clearAllTimers();S.click();vibOK();
  streak++;updateStreak();if(streak>1)showCombo(streak);
  const mult=multOverride!==undefined?multOverride:calcMult();
  const earned=Math.max(1,mult);
  score+=earned;if(score>bestScore)bestScore=score;localStorage.setItem('pb_best',bestScore);
  updateScoreUI();
  const pr=getRank(score-earned),nr=getRank(score);if(pr!==nr)S.rank();
  if(earned>1){doFlash('fy');S.bonus();showFB('✓ +'+earned+' BONUS!','bonus');showMult('×'+earned);}
  else{doFlash('fg');S.ok();showFB('✓ CORRECT','ok');}
  if(ev)floatPts('+'+earned,ev.clientX,ev.clientY);
  setTimeout(startRound,230);
}

function loseLife(){
  if(lives===1)showLastChance();
  lives--;updateLives();S.life();vibWrong();doShake();doFlash('fr');
  lifeEls[lives]?.classList.add('flash-die');setTimeout(()=>lifeEls[lives]?.classList.remove('flash-die'),450);
  streak=0;updateStreak();
  if(lives<=0){gameOver();return;}
  showFB('✗ -1 LIFE!','bad');setTimeout(startRound,550);
}
function handleWrong(){if(roundEnded)return;if(isFrenzy){frenzyWrong();return;}roundEnded=true;clearAllTimers();loseLife();}
function handleTimeout(){if(roundEnded)return;if(curInst&&curInst.type==='wait')doCorrect(null);else{roundEnded=true;clearAllTimers();loseLife();}}

// ══════════════════════════════════════
//  INPUT: TRIPLE CLICK/TAP
// ══════════════════════════════════════
function handleTriple(ev){
  tripleCount++;clearTimeout(tripleTO);
  if(tripleCount>=3){tripleCount=0;if(!gameActive||roundEnded||!curInst)return;if(curInst.type==='tripleclick')doCorrect(ev);else handleWrong();return;}
  tripleTO=setTimeout(()=>{tripleCount=0;},450);
}

// ══════════════════════════════════════
//  INPUT: MOUSE (desktop)
// ══════════════════════════════════════
function handleClick(e){
  if(!gameActive||roundEnded||!curInst)return;
  e.preventDefault();e.stopPropagation();
  if(curInst.type==='tripleclick'){handleTriple(e);return;}
  if(curInst.type==='dblclick'){dblGuard=true;setTimeout(()=>{if(!roundEnded&&dblGuard){dblGuard=false;handleWrong();}},290);return;}
  dblGuard=false;
  if(curInst.type==='click')doCorrect(e);else handleWrong();
}
function handleDblClick(e){if(!gameActive||roundEnded||!curInst)return;e.preventDefault();e.stopPropagation();dblGuard=false;if(curInst.type==='dblclick')doCorrect(e);else if(!roundEnded)handleWrong();}
function handleRightClick(e){e.preventDefault();if(!gameActive||roundEnded||!curInst)return;if(curInst.type==='rightclick')doCorrect(e);else handleWrong();}
function handleKeyDown(e){
  if(!gameActive||roundEnded||!curInst)return;const k=e.code;
  if(k==='Space'){e.preventDefault();if(curInst.type==='space'){doCorrect(null);return;}if(curInst.type==='hold_space'){if(!holdActive&&!holdDone){holdActive=true;startHoldProgress();holdTO=setTimeout(()=>{if(holdActive&&!roundEnded){holdDone=true;doCorrect(null);}},HOLD_DUR);}return;}handleWrong();return;}
  if(k==='Enter'){e.preventDefault();curInst.type==='enter'?doCorrect(null):handleWrong();return;}
  if(k==='KeyA'){curInst.type==='key_a'?doCorrect(null):handleWrong();return;}
  if(k==='Escape'){if(curInst.type==='key_escape')doCorrect(null);return;}
}
function handleKeyUp(e){if(e.code==='Space'&&holdActive){holdActive=false;clearTimeout(holdTO);cancelAnimationFrame(holdRAF);holdRingEl.classList.remove('show');if(!holdDone&&!roundEnded&&gameActive&&curInst&&(curInst.type==='hold_space'))handleWrong();}}
function handleMouseMove(e){if(!gameActive||roundEnded||!curInst)return;const dx=e.clientX-lastMX,dy=e.clientY-lastMY,d=Math.sqrt(dx*dx+dy*dy);mouseDist+=d;lastMX=e.clientX;lastMY=e.clientY;if(curInst.type==='move'&&mouseDist>90&&!roundEnded){doCorrect(e);return;}if(curInst.type==='wait'&&mouseDist>120&&!roundEnded)handleWrong();}

// ══════════════════════════════════════
//  INPUT: TOUCH (mobile)
// ══════════════════════════════════════

// Touch on the button itself
pb.addEventListener('touchstart',(e)=>{
  if(!gameActive||roundEnded||!curInst)return;
  e.preventDefault();
  // hold_btn: start hold
  if(curInst.type==='hold_btn'){
    if(!holdActive&&!holdDone){
      holdActive=true;startHoldProgress();
      holdTO=setTimeout(()=>{if(holdActive&&!roundEnded){holdDone=true;doCorrect(null);}},HOLD_DUR);
    }
  }
},{passive:false});

pb.addEventListener('touchend',(e)=>{
  if(!gameActive||roundEnded||!curInst)return;
  e.preventDefault();e.stopPropagation();
  const t=curInst.type;
  // Release hold early
  if(t==='hold_btn'){
    holdActive=false;clearTimeout(holdTO);cancelAnimationFrame(holdRAF);holdRingEl.classList.remove('show');
    if(!holdDone&&!roundEnded)handleWrong();
    return;
  }
  // Triple
  if(t==='tripleclick'){handleTriple(e.changedTouches[0]||e);return;}
  // Double tap
  if(t==='dblclick'){
    dblGuard=true;
    setTimeout(()=>{if(!roundEnded&&dblGuard){dblGuard=false;handleWrong();}},320);
    return;
  }
  // Single tap
  if(t==='click')doCorrect(e.changedTouches[0]||e);
  else handleWrong();
},{passive:false});

// Double-tap detection (fires after two touchend events)
let lastTapTime=0;
pb.addEventListener('touchend',(e)=>{
  if(!gameActive||roundEnded||!curInst)return;
  if(curInst.type!=='dblclick')return;
  const now=Date.now();
  if(now-lastTapTime<320){
    dblGuard=false;doCorrect(e.changedTouches[0]||e);lastTapTime=0;
  } else {
    lastTapTime=now;
  }
},{passive:false,capture:true});

// Swipe detection — on the full cab
cab.addEventListener('touchstart',(e)=>{
  if(!gameActive||roundEnded)return;
  const t=e.touches[0];touchStartX=t.clientX;touchStartY=t.clientY;touchMoved=false;swipeHandled=false;
},{passive:true});

cab.addEventListener('touchmove',(e)=>{
  if(!gameActive||roundEnded||!curInst)return;
  const t=e.touches[0];
  const dx=t.clientX-touchStartX,dy=t.clientY-touchStartY;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>8)touchMoved=true;
  // Stay-still violation
  if(curInst.type==='wait'&&dist>80&&!roundEnded)handleWrong();
},{passive:true});

cab.addEventListener('touchend',(e)=>{
  if(!gameActive||roundEnded||!curInst||swipeHandled)return;
  if(!touchMoved)return; // not a swipe — handled by button touchend
  const t=e.changedTouches[0];
  const dx=t.clientX-touchStartX,dy=t.clientY-touchStartY;
  const adx=Math.abs(dx),ady=Math.abs(dy);
  if(Math.max(adx,ady)<40)return; // too short
  swipeHandled=true;
  let dir;
  if(adx>ady)dir=dx>0?'swipe_right':'swipe_left';
  else        dir=dy>0?'swipe_down':'swipe_up';
  if(curInst.type===dir)doCorrect(t);
  else if(['swipe_up','swipe_down','swipe_left','swipe_right'].includes(curInst.type))handleWrong();
  // swipe on non-swipe round = wait violation
  else if(curInst.type==='wait')handleWrong();
},{passive:true});

// Outside tap trap for wait on mobile
document.addEventListener('touchend',(e)=>{
  if(!gameActive||roundEnded||!curInst)return;
  if(e.target===pb||e.target.classList.contains('decoy'))return;
  if(scrStart.contains(e.target)||scrGO.contains(e.target))return;
  if(curInst.type==='wait')handleWrong();
},{passive:true});

// Desktop outside-click trap for wait
document.addEventListener('click',(e)=>{
  if(!gameActive||roundEnded||!curInst)return;
  if(e.target===pb||e.target.classList.contains('decoy'))return;
  if(scrStart.contains(e.target)||scrGO.contains(e.target))return;
  if(curInst.type==='wait')handleWrong();
},true);

// ══════════════════════════════════════
//  GAME OVER
// ══════════════════════════════════════
function gameOver(){
  gameActive=false;isFrenzy=false;frRing.classList.remove('on');chromaOff();stopHB();ekgPanic=0;bgIntensity=0;corruptLevel=0;
  doShake();doFlash('fr');S.wrong();streak=0;updateStreak();
  const isNew=score>0&&score>=bestScore;
  if(score>bestScore){bestScore=score;localStorage.setItem('pb_best',bestScore);}
  goScore.textContent=score;goBest.textContent=bestScore;goMsg.textContent=rand(FAIL_MSGS);goRank.textContent=getRank(score);
  goDied.textContent='Died on: '+(curInst?curInst.text:'???');
  goNB.className=isNew?'new-best-badge':'new-best-badge hidden';
  scrGO.classList.remove('off');
}

// ══════════════════════════════════════
//  START
// ══════════════════════════════════════
function startGame(){
  getAC();
  // Choose instruction set
  INSTS=isMobile?INSTS_MOBILE:INSTS_DESKTOP;
  FRENZY_INSTS=isMobile?FRENZY_MOBILE:FRENZY_DESKTOP;
  score=0;lives=3;streak=0;roundN=0;prevInst=null;specialRound=null;isFrenzy=false;bgIntensity=0;corruptLevel=0;ekgPanic=0;
  gameActive=true;updateScoreUI();updateLives();updateStreak();
  scrStart.classList.add('off');scrGO.classList.add('off');
  tbarEl.style.width='100%';tbarEl.className='timer-bar';frRing.classList.remove('on');chromaOff();tauntEl.textContent='';
  startRound();
}

// ══════════════════════════════════════
//  EVENTS
// ══════════════════════════════════════
btnStart.addEventListener('click',startGame);btnRetry.addEventListener('click',startGame);
btnStart.addEventListener('touchend',(e)=>{e.preventDefault();startGame();},{passive:false});
btnRetry.addEventListener('touchend',(e)=>{e.preventDefault();startGame();},{passive:false});

pb.addEventListener('click',handleClick);
pb.addEventListener('dblclick',handleDblClick);
pb.addEventListener('contextmenu',handleRightClick);
document.addEventListener('keydown',handleKeyDown);
document.addEventListener('keyup',handleKeyUp);
document.addEventListener('mousemove',handleMouseMove);
document.addEventListener('contextmenu',(e)=>{if(gameActive)e.preventDefault();});

// Prevent default scroll/zoom on mobile during gameplay
document.addEventListener('touchmove',(e)=>{if(gameActive)e.preventDefault();},{passive:false});

// ══════════════════════════════════════
//  INIT
// ══════════════════════════════════════
fillTips();
updateScoreUI();bestSval.textContent=bestScore;hsNum.textContent=bestScore;updateLives();
</script>
